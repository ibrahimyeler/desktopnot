      user_id:
        type: string
    type: object
  handlers.TokenInfo:
    properties:
      expires_at:
        type: integer
      expires_in:
        type: integer
      issued_at:
        type: integer
      refresh_token:
        type: string
      type:
        type: string
    type: object
  handlers.User:
    properties:
      email:
        type: string
      firstname:
        type: string
      id:
        type: string
      lastname:
        type: string
    type: object
  main.Admin:

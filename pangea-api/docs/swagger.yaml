basePath: /api/v1
definitions:
  handlers.Admin:
    properties:
      email:
        type: string
      firstname:
        type: string
      id:
        type: string
      lastname:
        type: string
      permissions:
        items:
          type: string
        type: array
      role:
        type: string
    type: object
  handlers.AdminLoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handlers.AdminLoginResponse:
    properties:
      admin:
        $ref: '#/definitions/handlers.Admin'
      message:
        type: string
      success:
        type: boolean
      token:
        type: string
      token_info:
        $ref: '#/definitions/handlers.TokenInfo'
    type: object
  handlers.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handlers.LoginResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
      token:
        type: string
      user:
        $ref: '#/definitions/handlers.User'
    type: object
  handlers.RegisterRequest:
    properties:
      confirm_password:
        type: string
      email:
        type: string
      firstname:
        type: string
      lastname:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - confirm_password
    - email
    - firstname
    - lastname
    - password
    type: object
  handlers.RegisterResponse:
    properties:
      message:
        type: string
      success:

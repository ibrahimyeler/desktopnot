<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Endpoint Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="email"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 5px;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .test-cases {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .test-case {
            margin-bottom: 15px;
            padding: 10px;
            background: white;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        .response {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 14px;
        }
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .info {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Login Endpoint Test</h1>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit">Login</button>
        </form>

        <div class="test-cases">
            <h3>🧪 Test Cases</h3>
            
            <div class="test-case">
                <strong>✅ Valid Login:</strong>
                <p>Email: test@example.com | Password: password123</p>
                <button onclick="testValidLogin()">Test Valid Login</button>
            </div>
            
            <div class="test-case">
                <strong>❌ Invalid Credentials:</strong>
                <p>Email: wrong@example.com | Password: wrongpass</p>
                <button onclick="testInvalidLogin()">Test Invalid Login</button>
            </div>
            
            <div class="test-case">
                <strong>⚠️ Invalid Email Format:</strong>
                <p>Email: invalid-email | Password: password123</p>
                <button onclick="testInvalidEmail()">Test Invalid Email</button>
            </div>
            
            <div class="test-case">
                <strong>⚠️ Missing Fields:</strong>
                <p>Empty email and password</p>
                <button onclick="testMissingFields()">Test Missing Fields</button>
            </div>
        </div>

        <div id="response" class="response" style="display: none;"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            await login(email, password);
        });

        async function login(email, password) {
            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });

                const data = await response.json();
                showResponse(data, response.ok);
            } catch (error) {
                showResponse({
                    success: false,
                    message: 'Network error: ' + error.message
                }, false);
            }
        }

        function showResponse(data, isSuccess) {
            const responseDiv = document.getElementById('response');
            responseDiv.style.display = 'block';
            responseDiv.className = `response ${isSuccess ? 'success' : 'error'}`;
            responseDiv.textContent = JSON.stringify(data, null, 2);
        }

        async function testValidLogin() {
            await login('test@example.com', 'password123');
        }

        async function testInvalidLogin() {
            await login('wrong@example.com', 'wrongpass');
        }

        async function testInvalidEmail() {
            await login('invalid-email', 'password123');
        }

        async function testMissingFields() {
            await login('', '');
        }

        // Check API health on page load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                console.log('API Health Check:', data);
            } catch (error) {
                console.error('API Health Check Failed:', error);
            }
        });
    </script>
</body>
</html>

version: '3.8'

services:
  # Jaeger - Telescope benzeri tracing UI
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: kovan-jaeger
    ports:
      - "16686:16686"  # Jaeger UI (Telescope benzeri)
      - "14268:14268"  # HTTP collector
      - "14250:14250"  # gRPC collector
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - kovan-observability

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: kovan-otel-collector
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics
    depends_on:
      - jaeger
    networks:
      - kovan-observability

  # Grafana - Advanced observability UI
  grafana:
    image: grafana/grafana:latest
    container_name: kovan-grafana
    ports:
      - "3000:3000"   # Grafana UI
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - kovan-observability

  # Prometheus - Metrics storage
  prometheus:
    image: prom/prometheus:latest
    container_name: kovan-prometheus
    ports:
      - "9090:9090"   # Prometheus UI
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-storage:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - kovan-observability

networks:
  kovan-observability:
    driver: bridge

volumes:
  grafana-storage:
  prometheus-storage:
